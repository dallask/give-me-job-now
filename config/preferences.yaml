# config/preferences.yaml — structured narrowing / ranking signals for offer search.
#
# Every field only NARROWS or RANKS within config/sources.yaml. The `scope` block
# below may only restrict the boards/geos/languages already declared in sources.yaml —
# it can NEVER widen them. scripts/preferences/gmj_validate_preferences.py enforces the
# subset-of-sources.yaml invariant (fail-closed) and never writes sources.yaml.
salary:
  min: 1000
  currency: USD
  period: month
work_conditions:
  mode: [remote, hybrid]
  relocation: false
preferences:
  - "fully remote"
  - "async team"
  - "military reservation"
search_keywords:
  - php
  - laravel
  - drupal
  - FPV Engineer
  - FPV Systems Engineer
  - FPV Pilot
  - AI Developer
  - AI Creator
ranking:
  salary_weight: 0.4
  remote_weight: 0.6

# All text content translated to Ukrainian

title: "Провідний PHP-інженер | Laravel / Drupal / React / Full-Stack"
summary: >
  Провідний PHP-інженер з 19+ роками досвіду розробки виробничих веб-систем — рішення
  для корпоративних клієнтів у сферах e-commerce, медіа, охорони здоров'я та
  корпоративного сектору: Laravel REST API-сервіси та мікросервісні архітектури,
  корпоративні CMS-платформи Drupal (EPAM Systems), Bitrix, WordPress та кастомні
  PHP-застосунки. Наразі очолює розробку мультисайтової платформи Drupal 8–11 для
  міжнародного фармацевтичного клієнта (Otsuka) в EPAM, керує командою 20 розробників
  у складі delivery-команди з 47 осіб, відповідає за Design System на React/Next.js,
  побудований з використанням Figma, Storybook та Style Dictionary. Має досвід із
  структурою Laravel-застосунків, Eloquent ORM та API-first підходами, а також глибоку
  експертизу з модульної та темплейтної розробки Drupal. Досвід технічного директора
  охоплює захист безпеки, SEO-орієнтовану розробку, e-commerce інтеграції та
  координацію agile-команд.


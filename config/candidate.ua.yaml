    description: "Керував командою 20 розробників, що забезпечувала мультисайтову екосистему Drupal 8–11 для Otsuka (міжнародна фармацевтична компанія) в EPAM."
    icon: "🏆"
  - title: "Design System на React/Next.js"
    description: "Побудував бібліотеку спільних компонентів на Figma, Storybook та Style Dictionary — атомарний дизайн і design tokens для мультисайтової платформи."
    icon: "⚡"
  - title: "На 30% менше регресій"
    description: "Впровадив CI/CD-інструменти та автоматизацію Capistrano, досягнувши zero-downtime релізів у мультисайтових середовищах."
    icon: "📈"
  - title: "50+ реалізованих проектів"
    description: "Керував full-stack розробкою 50+ веб-проектів у сферах e-commerce, корпоративного та медіа-секторів у студії [empty]."
    icon: "🚀"
  - title: "80%+ покриття юніт-тестами"
    description: "Впровадив PHPUnit та PHP Code Sniffer, підвищивши покриття основних модулів до 80%+ у командах розробки."
    icon: "✅"


title: 'Инженер FPV-систем | Встраиваемые системы / Электроника / Прошивки / Управление БПЛА'
summary: 'Инженер с практическим опытом проектирования и сборки FPV-дронов, прошедший военный курс теории и боевого применения БАС класса 1 типа FPV (сертификат GDA, 2025). Владею прототипированием на Arduino и Raspberry Pi для бортовой электроники и companion-компьютеров, работой с реального-временными системами управления, а также навыками отладки и интеграции встраиваемого ПО. Имею подтверждённый инженерный фундамент: 19+ лет разработки сложных технических систем, включая опыт проектирования промышленных объектов и руководства техническими командами. Способен выстраивать полный цикл разработки БПЛА-продукта — от схемотехники и выбора компонентов до настройки полётного контроллера и полевых испытаний. Совмещаю системное техническое мышление с практическим пониманием FPV-платформ и их боевого применения.'

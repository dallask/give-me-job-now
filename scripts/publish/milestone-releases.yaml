# milestone-releases.yaml — real, historical release backfill data for
# scripts/publish/gmj_bootstrap_releases.py. Ships into the public mirror.
#
# Each entry anchors a GitHub Release to the last real (non-excluded-path) commit
# before that milestone's completion — located by exact commit-message match,
# NOT by hardcoded SHA (SHAs are rewritten on every mirror publish by
# git-filter-repo; commit messages survive verbatim since none of the real
# --replace-text redaction tokens appear in them).
releases:

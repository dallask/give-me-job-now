# release.yml — semantic-release + milestone-backfill CI for the PUBLIC mirror repo.
# Runs inside give-me-job-now itself (this file ships there via the sanitize-and-mirror
# publisher). Triggers on push to main — which is exactly what gmj_publish_mirror.sh's
# force-push does on every publish, so no cross-repo dispatch is needed.
#
# Tag/release steps use secrets.PUBLIC_REPO_PAT (a repo secret configured directly on
# give-me-job-now), not the automatic secrets.GITHUB_TOKEN: GitHub hard-blocks the
# automatic token from ever pushing changes to .github/workflows/* content, with no
# `permissions:` override possible. Since every mirror publish rewrites this repo's
# entire history via git-filter-repo, older milestone tags can point at commits whose
# .github/workflows/*.yml content differs from what the automatic token has already
# been allowed to push, which trips that protection on `git push --force origin <tag>`.
#
# IMPORTANT: raw `git push`/`git tag` calls (used directly inside
# gmj_bootstrap_releases.py, not through `gh`) authenticate via the git credential
# helper that actions/checkout@v4 configures at job start from ITS OWN `token:` input —
# NOT from a later step's GH_TOKEN env var. Both must be set to PUBLIC_REPO_PAT: the
# checkout `token:` input (for raw `git push`) AND each step's GH_TOKEN env var (for
# `gh` CLI calls like `gh release delete`/`gh release create`).
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLIC_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r scripts/publish/requirements.txt

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prune orphaned tags/releases from previous mirror rewrites
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -euo pipefail
          # Every publish-mirror run force-rewrites this repo's entire history from
          # scratch (git-filter-repo on the private side), so ANY tag left over from
          # a prior run — one of the 5 backfilled milestone tags, OR a real tag
          # semantic-release cut on its own (e.g. v4.1.0) — may now point at a commit
          # that is no longer reachable from the current HEAD. A stale-but-present
          # tag makes semantic-release conclude "already released" and skip
          # re-cutting a release whose content `main` doesn't actually contain
          # anymore. Delete any tag (and its GitHub Release, if one exists) that is
          # not an ancestor of the current HEAD, so both the milestone backfill and
          # semantic-release always recompute fresh against what's really on `main`.
          for tag in $(git tag); do
            if ! git merge-base --is-ancestor "$tag" HEAD 2>/dev/null; then
              echo "Pruning orphaned tag: $tag"
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
              git push origin ":refs/tags/$tag" 2>/dev/null || true
              git tag -d "$tag" 2>/dev/null || true
            fi
          done

      - name: Backfill real milestone releases (idempotent — recreated fresh every run)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: python3 scripts/publish/gmj_bootstrap_releases.py

      # python-semantic-release 10.x CLI surface (verified against the installed
      # version's own `semantic-release --help` / `version --help` output —
      # there is no separate "changelog"+"push" step needed here: `version`
      # itself commits/tags/pushes/creates the VCS release in one pass by
      # default). `publish` additionally builds+uploads any dist/ assets to
      # the release (a no-op for this repo, which ships no Python package).
      - name: Semantic-release for any commits beyond the last milestone
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          semantic-release version || echo "No release-worthy commits beyond the last milestone tag — nothing to do."
          semantic-release publish || true
